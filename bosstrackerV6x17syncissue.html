<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boss Tracker Fantasia</title>
<style>
:root{
    --bg:#0f1115;
    --panel:#151820;
    --panel-2:#1a1d24;
    --border:#2a2f3a;
    --text:#e6e6e6;
    --muted:#9ca3af;
    --red:#c0392b;
    --yellow:#eab308;
    --green:#22c55e;
    --blue:#60a5fa;
}

*{box-sizing:border-box}

body{
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
    margin:0;
    padding:14px;
}

button,input{
    font-family:inherit;
    padding:5px 10px;
    border-radius:6px;
    border:1px solid #333846;
    background:var(--panel-2);
    color:white;
}

button:hover{
    background:#252933;
    cursor:pointer;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(340px,340px));
    gap:10px;
}

.card{
    background:var(--panel);
    border-radius:10px;
    padding:8px;
    display:flex;
    flex-direction:column;
    gap:6px;
    border:1px solid var(--border);
    transition:border-color .2s, box-shadow .2s;
    min-width:0;
    max-width:340px;
    overflow:hidden;
}

.card.window{
    border-color:var(--yellow);
    box-shadow:0 0 0 1px rgba(234,179,8,.15);
}

.card.spawned{
    border-color:var(--green);
    box-shadow:0 0 0 1px rgba(34,197,94,.2), 0 0 14px rgba(34,197,94,.08);
}

.boss{
    font-size:18px;
    font-weight:700;
    line-height:1.1;
}

.windowText{
    font-size:12px;
    color:var(--muted);
}

.killBtn{
    font-size:12px;
    font-weight:700;
    padding:4px 10px;
    background:#1e2a1e;
    border-color:#2d4a2d;
    color:var(--green);
}

.killBtn:hover{background:#243324}

.chRow{
    display:flex;
    flex-direction:column;
    gap:3px;
    border:1px solid #3d4455;
    border-radius:6px;
    padding:7px 8px;
    background:#1e2130;
    box-sizing:border-box;
    overflow:hidden;
}

.chTop{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
}

.chLabel{
    font-size:13px;
    font-weight:700;
    color:var(--text);
    width:14px;
    flex-shrink:0;
    align-self:center;
}

.chCountdown{
    font-size:13px;
    font-weight:700;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    min-height:1.2em;
}

.chTime{
    font-size:13px;
    color:var(--text);
    white-space:nowrap;
    flex-shrink:0;
    min-height:1.2em;
}

.chActions{
    display:flex;
    gap:4px;
    flex-shrink:0;
}

.chKillBtn{
    font-size:12px;
    font-weight:700;
    padding:3px 8px;
    background:#1e2a1e;
    border-color:#2d4a2d;
    color:var(--green);
}

.chKillBtn:hover{background:#243324}

.chClearBtn{
    font-size:12px;
    padding:3px 6px;
    color:#d1d5db;
}

.chBar{
    height:10px;
    width:0%;
    border-radius:2px;
    transition:width .4s linear, background .2s;
    background:var(--red);
}

.chProgress{
    width:100%;
    height:10px;
    background:#0b0c10;
    border-radius:2px;
    overflow:hidden;
    border:1px solid var(--border);
}

.clearBtn{
    font-size:11px;
    padding:4px 8px;
    color:#d1d5db;
}


.notReady{color:var(--red)}
.spawnedText{color:var(--green)}

.card.minimal{
    display:inline-flex;
    min-width:0;
    max-width:none;
    width:140px;
    padding:4px;
    gap:2px;
    margin:0;
}

.card.minimal .boss{
    font-size:13px;
    width:100%;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.card.minimal .chRow{
    width:100%;
    box-sizing:border-box;
    height:auto;
    padding:5px 7px;
    gap:4px;
}

.card.minimal .chTop{
    justify-content:flex-start;
    gap:4px;
    width:100%;
}

.card.minimal .chRow{
    cursor:pointer;
    transition:border-color .15s, background .15s;
}

.card.minimal .chRow:hover{
    border-color:#4a5568;
    background:#252a3a;
}

.card.minimal .chRow:active{
    background:#2d3448;
}

.card.minimal .chCountdown{
    flex:1;
    min-width:0;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.card.minimal .chProgress{
    margin-top:4px;
    width:100%;
}

.grid.minimal-grid{
    grid-template-columns:repeat(auto-fill,140px);
    gap:0;
    align-items:flex-start;
}

.subTabBtn{
    font-size:12px;
    font-weight:600;
    padding:4px 12px;
    border-radius:6px;
    border:1px solid #2a3040;
    background:#12151c;
    color:var(--muted);
    letter-spacing:0.03em;
}

.subTabBtn:hover{
    background:#1a1e28;
    cursor:pointer;
    color:var(--text);
}

.subTabBtn.active{
    background:#1e3a5f;
    border-color:var(--blue);
    color:#dbeafe;
}

.tabBtn{
    font-size:14px;
    font-weight:700;
    padding:6px 18px;
}

.tabBtn.active{
    background:#243041;
    border-color:var(--blue);
    color:#dbeafe;
}
.infoText{color:var(--blue)}

@media (max-width:900px){
    body{padding:14px}
    .grid{grid-template-columns:1fr}
    .boss{font-size:22px}
    .respawn{font-size:32px}
}

.card{
    cursor:grab;
}
.card:active{
    cursor:grabbing;
}
.card.dragging{
    opacity:0.4;
    border:2px dashed var(--blue);
}
.card.drag-over{
    border-color:var(--blue);
    box-shadow:0 0 0 2px rgba(96,165,250,.4);
}

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDAtnmWKHleQvCLvONFyJMIO9yqa5ZLY_0",
      authDomain: "bosstrackerv6x.firebaseapp.com",
      databaseURL: "https://bosstrackerv6x-default-rtdb.firebaseio.com",
      projectId: "bosstrackerv6x",
      storageBucket: "bosstrackerv6x.firebasestorage.app",
      messagingSenderId: "899568349645",
      appId: "1:899568349645:web:9333198a5afdfbbc7fd484"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const dataRef = ref(db, 'v3'); // v3: stores only { killTimestamp } per key, no nulls

    onValue(dataRef, snapshot => {
      const remote = snapshot.val() || {};

      const applyRemote = () => {
        let changed = false;
        Object.keys(remote).forEach(k => {
          const remoteKill = remote[k];
          const localKill = window._trackerData[k];
          // Only accept remote kill if it's more recent than local
          if(remoteKill && (!localKill || remoteKill > localKill)){
            window._trackerData[k] = remoteKill;
            changed = true;
          }
        });
        if(changed && window._updateFn) window._updateFn();
      };

      if(window._trackerReady && window._trackerData){
        applyRemote();
      } else {
        window._pendingApply = applyRemote;
      }
    });

    // Log a kill: store just the kill timestamp
    window._firebaseSet = (key, killTime) => set(ref(db, 'v3/' + key), killTime);

    // Clear a timer: remove it from Firebase entirely
    window._firebaseMarkCleared = (key) => remove(ref(db, 'v3/' + key));
  </script>

<script>
const STORAGE_KEY="fantasia_boss_tracker_data_v2"
const TAB_KEY="fantasia_boss_tracker_tab_v2"
let activeTab=parseInt(localStorage.getItem(TAB_KEY)||"2")
const NOTIFIED_KEY="fantasia_boss_tracker_notified_v2"
const PREV_KEY="fantasia_boss_tracker_prev_v2"
const META_KEY="fantasia_boss_tracker_meta_v2"

const HOUR=60*60*1000

// Anego: single combined card with 4 channels
const ANEGO_CHANNELS=[1,2,3,4]
const ANEGO_EARLIEST=4*HOUR
const ANEGO_LATEST=6*HOUR

function anegoId(ch){ return `Anego_Anego_Ch${ch}` }

// Bigfoot: combined card per location, 4 channels each
const BIGFOOT_EARLIEST=10*HOUR
const BIGFOOT_LATEST=14*HOUR
const BIGFOOT_CHANNELS=[1,2,3,4]
const BIGFOOT_LOCATIONS=["TP4","TP5","TP2","TP1","Forgotten Path","TP3","Evil Rising","Evil Dead"]

function bigfootId(location,ch){ return `Bigfoot_${location}_Ch${ch}`.replace(/[^a-zA-Z0-9]/g,"_") }

let data=JSON.parse(localStorage.getItem(STORAGE_KEY)||"{}")
let notified=JSON.parse(localStorage.getItem(NOTIFIED_KEY)||"{}")
let prev=JSON.parse(localStorage.getItem(PREV_KEY)||"{}")
let localMeta=JSON.parse(localStorage.getItem(META_KEY)||"{}")



function makeBoss(boss,location,startCh,endCh,earliestHours,latestHours){
    const rows=[]
    for(let ch=startCh; ch<=endCh; ch++){
        rows.push({
            id:`${boss}_${location}_Ch${ch}`.replace(/[^a-zA-Z0-9]/g,"_"),
            boss,
            location,
            channel:ch,
            label:`${location} Ch${ch}`,
            earliest:earliestHours*HOUR,
            latest:latestHours*HOUR
        })
    }
    return rows
}

function save(){
    localStorage.setItem(STORAGE_KEY,JSON.stringify(data))
    localStorage.setItem(NOTIFIED_KEY,JSON.stringify(notified))
    localStorage.setItem(PREV_KEY,JSON.stringify(prev))
    if(window._trackerMeta) localStorage.setItem(META_KEY,JSON.stringify(window._trackerMeta))
}
function createAnegoCard(grid, gridId='g1', minimal=false){
    const card=document.createElement("div")
    card.className="card"
    card.dataset.type="anego"
    card.dataset.grid=gridId
    if(minimal) card.classList.add("minimal")

    const cardTop=document.createElement("div")
    cardTop.style.cssText="text-align:center;margin-bottom:4px;"

    const bossLabel=document.createElement("div")
    bossLabel.className="boss"
    bossLabel.textContent="Anego"

    cardTop.appendChild(bossLabel)
    card.appendChild(cardTop)

    card.chRows={}

    ANEGO_CHANNELS.forEach(ch=>{
        const id=anegoId(ch)

        const row=document.createElement("div")
        row.className="chRow"

        const chTop=document.createElement("div")
        chTop.className="chTop"

        const chLabel=document.createElement("div")
        chLabel.className="chLabel"
        chLabel.textContent=`${ch}`

        const chCountdown=document.createElement("div")
        chCountdown.className="chCountdown notReady"
        chCountdown.textContent="No kill"

        const chTime=document.createElement("div")
        chTime.className="chTime"
        chTime.textContent=""

        const chActions=document.createElement("div")
        chActions.className="chActions"

        const killBtn=document.createElement("button")
        killBtn.className="chKillBtn"
        killBtn.textContent="Track"
        killBtn.onclick=()=>logKill(id)

        const revertBtn=document.createElement("button")
        revertBtn.className="chClearBtn"
        revertBtn.textContent="↩"
        revertBtn.title="Revert to previous"
        revertBtn.style.visibility="hidden"
        if(minimal) revertBtn.style.display='none'
        revertBtn.onclick=()=>revertEntry(id)

        const clearBtn=document.createElement("button")
        clearBtn.className="chClearBtn"
        clearBtn.textContent="✕"
        clearBtn.style.visibility="hidden"
        clearBtn.onclick=()=>clearEntry(id)

        chActions.appendChild(killBtn)
        if(!minimal) chActions.appendChild(revertBtn)
        if(!minimal) chActions.appendChild(clearBtn)

        const chSpawnTime=document.createElement("div")
        chSpawnTime.className="chTime"
        chSpawnTime.textContent="\u00a0"

        const chGroup=document.createElement("div")
        chGroup.style.cssText="display:flex;flex-direction:column;gap:1px;flex:1;"

        const chTimesRow=document.createElement("div")
        chTimesRow.style.cssText="display:flex;align-items:center;gap:6px;min-height:1.3em;"

        const chArrow=document.createElement("span")
        chArrow.textContent="→"
        chArrow.style.cssText="color:var(--muted);visibility:hidden;"

        if(!minimal) chTimesRow.appendChild(chTime)
        if(!minimal) chTimesRow.appendChild(chArrow)
        if(!minimal) chTimesRow.appendChild(chSpawnTime)

        const chProgress=document.createElement("div")
        chProgress.className="chProgress"

        const chBar=document.createElement("div")
        chBar.className="chBar"
        chProgress.appendChild(chBar)

        const chBarRow=document.createElement("div")
        chBarRow.appendChild(chProgress)

        if(minimal){
            chBarRow.style.cssText="visibility:hidden;min-height:10px;margin-top:3px;"

            const chMinimalInner=document.createElement("div")
            chMinimalInner.style.cssText="display:flex;flex-direction:column;flex:1;min-width:0;"
            chTop.appendChild(chCountdown)
            chMinimalInner.appendChild(chTop)
            chMinimalInner.appendChild(chBarRow)

            row.style.cssText="display:flex;flex-direction:row;align-items:center;gap:4px;cursor:pointer;"
            row.addEventListener("click",()=>logKill(id))
            row.appendChild(chLabel)
            row.appendChild(chMinimalInner)
        } else {
            chBarRow.style.cssText="visibility:hidden;margin-top:3px;min-height:10px;"
            chGroup.appendChild(chTimesRow)
            chGroup.appendChild(chCountdown)
            chTop.appendChild(chGroup)
            chTop.appendChild(chActions)

            const chInner=document.createElement("div")
            chInner.style.cssText="display:flex;flex-direction:column;flex:1;min-width:0;"
            chInner.appendChild(chTop)
            chInner.appendChild(chBarRow)

            row.style.cssText="display:flex;flex-direction:row;align-items:center;gap:8px;"
            row.appendChild(chLabel)
            row.appendChild(chInner)
        }

        card.chRows[ch]={row, chCountdown, chTime, chSpawnTime, chArrow, chBar, chBarRow, revertBtn, clearBtn, id}
        card.appendChild(row)
    })

    card.draggable=true
    card.draggable=true
    grid.appendChild(card)
    return card
}

function logKillManual(id, value){
    if(!value) return
    const [h,m]=value.split(":")
    const now=new Date()
    const kill=new Date()
    kill.setHours(Number(h),Number(m),0,0)
    if(kill>now) kill.setDate(kill.getDate()-1)
    data[id]=kill.getTime()
    notified[id]=false
    save()
    if(window._firebaseSet) window._firebaseSet(id, data[id])
    update()
}

function clearAll(){
    Object.keys(data).forEach(id=>{
    })
    data={}
    notified={}
    prev={}
    save()
    update()
}

function logKill(id){
    prev[id]=data[id]||null
    data[id]=Date.now()
    notified[id]=false
    save()
    if(window._firebaseSet) window._firebaseSet(id, data[id])
    update()
}

function clearEntry(id){
    prev[id]=data[id]||null
    delete data[id]
    delete notified[id]
    save()
    if(window._firebaseMarkCleared) window._firebaseMarkCleared(id)
    update()
}

function revertEntry(id){
    const previous=prev[id]
    if(previous===undefined) return
    if(previous===null){
        delete data[id]
        delete notified[id]
        if(window._firebaseMarkCleared) window._firebaseMarkCleared(id)
    } else {
        data[id]=previous
        notified[id]=false
        if(window._firebaseSet) window._firebaseSet(id, data[id])
    }
    delete prev[id]
    save()
    update()
}

function updateAnegoCard(card, now){
    let minRemain=999999999999
    ANEGO_CHANNELS.forEach(ch=>{
        const {chCountdown, chTime, chSpawnTime, chArrow, chBar, chBarRow, revertBtn, clearBtn, id}=card.chRows[ch]
        const kill=data[id]
        const isMinimal=card.classList.contains("minimal")

        if(!kill){
            chCountdown.textContent=isMinimal?"":"\u00a0"
            chCountdown.className="chCountdown notReady"
            chTime.textContent="\u00a0"
            chSpawnTime.textContent="\u00a0"
            chArrow.style.visibility="hidden"
            chBar.style.width="0%"
            chBar.style.background="var(--red)"
            chBarRow.style.visibility="hidden"
            revertBtn.style.visibility="hidden"
            if(!isMinimal) clearBtn.style.visibility="hidden"
            return
        }

        chBarRow.style.visibility="visible"
        revertBtn.style.visibility="visible"
        if(!isMinimal) clearBtn.style.visibility="visible"
        chArrow.style.visibility="visible"

        const diff=now-kill
        const earliestRespawn=new Date(kill+ANEGO_EARLIEST)
        const latestRespawn=new Date(kill+ANEGO_LATEST)
        const remainLatest=ANEGO_LATEST-diff
        const remainEarliest=ANEGO_EARLIEST-diff
        const progress=Math.max(0,Math.min(100,(diff/ANEGO_LATEST)*100))

        chBar.style.width=progress+"%"

        if(diff<ANEGO_EARLIEST){
            chTime.textContent=formatClock(new Date(kill))
            chCountdown.textContent=`next ${formatDuration(timerMode==='max'?remainLatest:remainEarliest)}`
            chCountdown.className="chCountdown notReady"
            chSpawnTime.textContent=formatClock(earliestRespawn)
            chBar.style.background="var(--red)"
            minRemain=Math.min(minRemain, remainEarliest+ANEGO_LATEST)

function updateManualCards(now){
    document.querySelectorAll(".card[data-grid^='g3']").forEach(card=>{
        const type=card.dataset.type
        let earliest=ANEGO_EARLIEST, latest=ANEGO_LATEST
        if(type==='bigfoot') { earliest=BIGFOOT_EARLIEST; latest=BIGFOOT_LATEST }
        else if(['hh','hhcr1','hhcr2','hhcr3','hhhe','hhce','hhfp','hhed'].includes(type)) { earliest=HH_EARLIEST; latest=HH_LATEST }
        else if(type==='bc') { earliest=BC_EARLIEST; latest=BC_LATEST }
        else if(type==='hk') { earliest=HK_EARLIEST; latest=HK_LATEST }
        else if(type==='lv') { earliest=LV_EARLIEST; latest=LV_LATEST }
        else if(type==='pl') { earliest=PL_EARLIEST; latest=PL_LATEST }
        else if(type==='pr') { earliest=PR_EARLIEST; latest=PR_LATEST }

        Object.values(card.chRows||{}).forEach(row=>{
            if(!row.chBar||!row.chCountdown) return
            const kill=data[row.id]
            if(!kill){
                row.chBar.style.width="0%"
                row.chBar.style.background="var(--red)"
                row.chCountdown.textContent=""
                row.chCountdown.className="chCountdown notReady"
                return
            }
            const diff=now-kill
            const remainEarliest=earliest-diff
            const remainLatest=latest-diff
            const progress=Math.max(0,Math.min(100,(diff/latest)*100))
            row.chBar.style.width=progress+"%"
            if(diff<earliest){
                row.chBar.style.background="var(--red)"
                row.chCountdown.textContent=`next ${formatDuration(timerMode==="max"?remainLatest:remainEarliest)}`
                row.chCountdown.className="chCountdown notReady"
            } else if(diff<latest){
                row.chBar.style.background="var(--yellow)"
                row.chCountdown.textContent=`Window open ${formatDuration(remainLatest)}`
                row.chCountdown.className="chCountdown readySoon"
            } else {
                row.chBar.style.background="var(--green)"
                const elapsed=diff-latest
                row.chCountdown.textContent=`closed ${formatDuration(elapsed)}`
                row.chCountdown.className="chCountdown spawnedText"
                if(elapsed>=3*HOUR){
                    delete data[row.id]
                    delete notified[row.id]
                    save()
                }
            }
        })
    })
}

let timerMode = 'window' // 'window' = countdown to earliest, 'max' = countdown to latest

function toggleTimerMode(){
    timerMode = timerMode === 'window' ? 'max' : 'window'
    const btn = document.getElementById('timerModeBtn')
    if(btn){
        // text stays as time-view
        btn.style.color = timerMode === 'max' ? '#93b4d4' : '#555'
        btn.style.borderColor = timerMode === 'max' ? '#3d5a80' : '#333'
        btn.style.background = timerMode === 'max' ? '#1a2235' : '#0d0f14'
    }
    update()
}

function formatCountdownText(diff, earliest, latest, isMinimal){
    const remainEarliest = earliest - diff
    const remainLatest = latest - diff
    if(diff < earliest){
        const val = timerMode === 'max' ? remainLatest : remainEarliest
        return `next ${formatDuration(val)}`
    } else if(diff < latest){
        return isMinimal ? `open ${formatDuration(remainLatest)}` : `Window open ${formatDuration(remainLatest)}`
    } else {
        const elapsed = diff - latest
        return `closed ${formatDuration(elapsed)}`
    }
}

function formatClock(date){
    return date.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"})
}

function formatDuration(ms){
    const safe=Math.max(0,ms)
    const s=Math.floor(safe/1000)
    const h=Math.floor(s/3600)
    const m=Math.floor((s%3600)/60)
    return `${h}h ${m}m`
}

function enableDragDrop(){
    let dragSrc=null

    document.addEventListener('dragstart', e=>{
        if(!e.target.closest) return
        const card=e.target.closest('.card')
        if(!card) return
        dragSrc=card
        card.classList.add('dragging')
        e.dataTransfer.effectAllowed='move'
    })

    document.addEventListener('dragend', e=>{
        if(!e.target.closest) return
        const card=e.target.closest('.card')
        if(card) card.classList.remove('dragging')
        document.querySelectorAll('.card.drag-over').forEach(c=>c.classList.remove('drag-over'))
        dragSrc=null
    })

    document.addEventListener('dragover', e=>{
        e.preventDefault()
        if(!e.target.closest) return
        const card=e.target.closest('.card')
        if(!card||card===dragSrc) return
        document.querySelectorAll('.card.drag-over').forEach(c=>c.classList.remove('drag-over'))
        card.classList.add('drag-over')
        e.dataTransfer.dropEffect='move'
    })

    document.addEventListener('drop', e=>{
        e.preventDefault()
        if(!e.target.closest) return
        const card=e.target.closest('.card')
        if(!card||card===dragSrc||!dragSrc) return
        card.classList.remove('drag-over')

        const srcGrid=dragSrc.parentElement
        const tgtGrid=card.parentElement

        // Allow drop within same grid OR within same flex wrapper
        const srcWrapper=srcGrid.parentElement
        const tgtWrapper=tgtGrid.parentElement
        if(srcGrid!==tgtGrid && srcWrapper!==tgtWrapper) return

        const cards=[...tgtGrid.children]
        const tgtIdx=cards.indexOf(card)

        if(srcGrid===tgtGrid){
            const srcIdx=cards.indexOf(dragSrc)
            if(srcIdx<tgtIdx) tgtGrid.insertBefore(dragSrc, card.nextSibling)
            else tgtGrid.insertBefore(dragSrc, card)
        } else {
            // Move card to target grid, insert before target card
            tgtGrid.insertBefore(dragSrc, card)
        }
    })
}


function refreshTopGrids(){
    ['1','2','3'].forEach(n=>{
        const state = n==='1'?subTabs1 : n==='2'?subTabs2 : subTabs
        const gridId = n==='3'?'grid3_top':`grid${n}_top`
        const grid = document.getElementById(gridId)
        if(!grid) return
        ;[...grid.children].forEach(card=>{
            const type=card.dataset.type
            if(type in state) card.style.display=state[type]?'':'none'
        })
    })
}

function initSubTabs(){
    refreshTopGrids()
    const tabs = [
        {state: subTabs1, prefix: 'subBtn1_', gridPrefix: 'grid1_'},
        {state: subTabs2, prefix: 'subBtn2_', gridPrefix: 'grid2_'},
        {state: subTabs,  prefix: 'subBtn_',  gridPrefix: 'grid3_'},
    ]
    tabs.forEach(({state, prefix, gridPrefix})=>{
        Object.keys(state).forEach(key=>{
            const btn=document.getElementById(prefix+key)
            if(btn) btn.classList.toggle('active', state[key])
            if(key==='hh'){
                HH_GRID_KEYS.forEach(k=>{
                    const grid=document.getElementById(gridPrefix+k)
                    if(grid) grid.style.display=state[key]?'grid':'none'
                })
            } else {
                const grid=document.getElementById(gridPrefix+key)
                if(grid) grid.style.display=state[key]?'grid':'none'
            }
        })
    })
}

create()
setTab(activeTab)
initSubTabs()
enableDragDrop()
update()
window._trackerData = data
window._trackerMeta = localMeta
window._updateFn = update
window._trackerReady = true

// Apply any Firebase data that arrived before tracker was ready
if(window._pendingApply){
    window._pendingApply()
    window._pendingApply = null
}
setInterval(update,1000)
</script>
